<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lab 8-9 - Document.cookie MDN Examples</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 30px auto; padding: 0 20px; }
    button { margin: 5px; padding: 8px 14px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
    h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; }
  </style>
</head>
<body>
  <h1>Bine ai venit la lab</h1>
  <button onclick="alertCookie()">Show cookies</button>

  <hr>

  <h2>1. Setare cookie simplu</h2>
  <button onclick="setCookieSimple()">Set cookie simplu</button>

  <h2>2. Setare cookie cu dată de expirare</h2>
  <button onclick="setCookieExpire()">Set cookie cu expirare (7 zile)</button>

  <h2>3. Citire cookie după nume</h2>
  <input id="cookieName" placeholder="Nume cookie" />
  <button onclick="getCookieByName()">Citește cookie</button>
  <pre id="cookieResult"></pre>

  <h2>4. Ștergere cookie</h2>
  <input id="deleteName" placeholder="Nume cookie de șters" />
  <button onclick="deleteCookie()">Șterge cookie</button>

  <h2>5. Afișare toate cookies</h2>
  <button onclick="showAllCookies()">Afișează toate cookies</button>
  <pre id="allCookies"></pre>

  <h2>6. Verificare dacă cookie există</h2>
  <input id="checkName" placeholder="Nume cookie" />
  <button onclick="checkCookieExists()">Verifică existența</button>
  <pre id="checkResult"></pre>

  <script>
    // Cookie-urile din task 4
    document.cookie = "session=test GDPR";
    document.cookie = "favorite_task=collect Data";

    // 1. Show cookies (task 4)
    function alertCookie() {
      alert(document.cookie);
    }

    // 2. Setare cookie simplu
    function setCookieSimple() {
      document.cookie = "username=Darius";
      alert("Cookie setat: username=Darius");
    }

    // 3. Setare cookie cu expirare
    function setCookieExpire() {
      const date = new Date();
      date.setTime(date.getTime() + (7 * 24 * 60 * 60 * 1000));
      const expires = "expires=" + date.toUTCString();
      document.cookie = "remember_me=true; " + expires + "; path=/";
      alert("Cookie setat cu expirare in 7 zile: remember_me=true");
    }

    // 4. Citire cookie dupa nume (functie MDN)
    function getCookie(name) {
      const nameEQ = name + "=";
      const cookies = document.cookie.split(';');
      for (let c of cookies) {
        c = c.trim();
        if (c.indexOf(nameEQ) === 0) {
          return c.substring(nameEQ.length);
        }
      }
      return null;
    }

    function getCookieByName() {
      const name = document.getElementById("cookieName").value;
      const value = getCookie(name);
      document.getElementById("cookieResult").textContent =
        value ? name + " = " + value : "Cookie '" + name + "' nu a fost găsit.";
    }

    // 5. Stergere cookie
    function deleteCookie() {
      const name = document.getElementById("deleteName").value;
      document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=";
      document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
      alert("Cookie '" + name + "' a fost șters.");
    }
 

    // 6. Afisare toate cookies
    function showAllCookies() {
      const all = document.cookie.split(';');
      const result = all.map(c => c.trim()).join('\n');
      document.getElementById("allCookies").textContent = result || "Nu există cookies.";
    }

    // 7. Verificare existenta cookie
    function checkCookieExists() {
      const name = document.getElementById("checkName").value;
      const exists = getCookie(name) !== null;
      document.getElementById("checkResult").textContent =
        exists ? "Cookie '" + name + "' EXISTĂ." : "Cookie '" + name + "' NU există.";
    }
  </script>
</body>
</html>
